cluster:
  name: swg-llm
  debate_rounds: 3

cluster_control:
  # fixed => always use fixed_coordinator_id
  # election => coordinator elected from healthy nodes
  coordinator_mode: fixed
  fixed_coordinator_id: agent_192_168_88_5
  heartbeat_ttl_seconds: 30
  telemetry_retention_cycles: 100
  queue:
    max_inflight_tasks: 8
    allowed_task_types:
      - ingestion
      - debate

retry_policy:
  max_attempts: 3
  backoff_seconds: 5
  retry_on:
    - transient_network_error
    - timeout
    - rate_limit

nodes:
  - address: 192.168.88.5
    role: orchestrator_agent
    agent_id: agent_192_168_88_5
    enabled: true
    health_endpoint: http://192.168.88.5:8080/healthz

  - address: 192.168.88.10
    role: reviewer_agent
    agent_id: agent_192_168_88_10
    enabled: true
    health_endpoint: http://192.168.88.10:8080/healthz

stages:
  - name: ingestion
    module: ingestion
  - name: consensus
    module: consensus
  - name: sync
    module: sync
